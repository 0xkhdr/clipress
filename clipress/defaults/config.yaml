# clipress default configuration
# These defaults are merged with workspace .compressor/config.yaml

engine:
  min_lines_to_compress: 15
  hot_cache_threshold: 10
  show_metrics: false
  strip_ansi: true
  pass_through_on_error: true

safety:
  binary_non_ascii_ratio: 0.3
  security_patterns:
    - '\.env$'
    - '\.env\.'
    - 'id_rsa'
    - 'id_ed25519'
    - '\.pem$'
    - '\.key$'
    - 'credentials'
    - 'secret'
    - 'password'
    - 'api[_-]?key'
    - 'AWS_SECRET'
    - 'GITHUB_TOKEN'
    - 'bearer\s+[a-zA-Z0-9]'
    - '-----BEGIN'

contracts:
  global:
    always_keep: []
    always_strip: []

commands: {}
