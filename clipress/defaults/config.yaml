# clipress default configuration
# These defaults are merged with workspace .clipress/config.yaml

engine:
  min_lines_to_compress: 15
  hot_cache_threshold: 10
  show_metrics: false
  strip_ansi: true
  pass_through_on_error: true
  max_output_bytes: 10485760  # 10 MB — outputs larger than this are passed through to avoid OOM

safety:
  binary_non_ascii_ratio: 0.3
  # Extra regex patterns that extend the built-in security block list.
  # The built-in defaults (secret/password/id_rsa/...) always apply; these are additive.
  security_patterns: []

contracts:
  global:
    always_keep: []
    always_strip: []

commands: {}
